<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tennis Draw</title>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0f4ee; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function parseNames(raw) {
      const STOPWORDS = /^(final|list|for|see|you|in|the|and|of|at|tomorrow|morning|tonight|ok|hi|hey|soon|next|out|with|from)$/i;
      const lines = raw.split(/\n/).map(l => l.trim()).filter(l => {
        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(l)) return false;
        if (/^\[?\d{1,2}:\d{2}/.test(l)) return false;
        if (/^~\s/.test(l)) return false;
        if (/messages? and calls? are end-to-end/i.test(l)) return false;
        return true;
      });
      const tokens = lines.join(", ").replace(/^\s*\d+[\.\)]\s*/gm, " ").split(/[\n,;]+/).map(t => t.trim()).filter(Boolean);
      const names = [];
      for (const token of tokens) {
        if (token.length > 20 || /\d/.test(token) || /\s/.test(token) || STOPWORDS.test(token)) continue;
        if (/^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ'-]{1,19}$/.test(token)) {
          const name = token.charAt(0).toUpperCase() + token.slice(1).toLowerCase();
          if (!names.includes(name)) names.push(name);
        }
      }
      return names;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function buildDraw(players) {
      const a = shuffle([...players]);
      const teams = []; for (let i = 0; i + 1 < a.length; i += 2) teams.push([a[i], a[i + 1]]);
      const solo = a.length % 2 === 1 ? a[a.length - 1] : null;
      const courts = []; let n = 1;
      for (let i = 0; i + 1 < teams.length; i += 2) { courts.push({ label: `Court ${n}`, team1: teams[i], team2: teams[i + 1], type: "doubles" }); n++; }
      if (teams.length % 2 === 1) courts.push({ label: `Court ${n}`, team1: teams[teams.length - 1], team2: null, type: "singles" });
      if (solo) courts.push({ label: "Sitting Out", team1: [solo], team2: null, type: "sitout" });
      return courts;
    }

    function useReveal(key) {
      const [on, setOn] = useState(false);
      useEffect(() => { if (!key) { setOn(false); return; } const t = setTimeout(() => setOn(true), 60); return () => clearTimeout(t); }, [key]);
      return on;
    }

    const THEMES = {
      club: {
        name: "Club", emoji: "🌿", font: "Georgia,'Times New Roman',serif",
        pageBg: "#f0f4ee", pageGradient: "radial-gradient(circle at 20% 50%,rgba(74,124,89,0.04) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(74,124,89,0.06) 0%,transparent 40%)",
        titleColor: "#1a2e1a", accentBar: "#4a7c59",
        panelBg: "white", panelShadow: "0 2px 12px rgba(26,46,26,0.08)", panelBorder: "none",
        headerBg: "#4a7c59", headerColor: "white", headerBadgeBg: "rgba(255,255,255,0.25)", headerBadgeColor: "white",
        textareaBg: "#fafcfa", textareaBorder: "#c8dcc8", textareaFocus: "#4a7c59", textareaColor: "#1a2e1a", textareaPlaceholder: "#b0c4b0",
        chipBg: "#f0f7f0", chipBorder: "#c8dcc8", chipColor: "#2a4a2a",
        chipHoverBg: "#ffe8e8", chipHoverBorder: "#e8a0a0", chipHoverColor: "#8a2020",
        footerBorder: "#edf2ed", footerText: "#9aaa9a", footerMuted: "#c0a0a0",
        drawBtnBg: "#4a7c59", drawBtnColor: "white", drawBtnHover: "#3a6347", drawBtnBorder: "none",
        drawBtnDisabledBg: "#b0c4b0", drawBtnDisabledColor: "white",
        editBtnColor: "#4a7c59", editBtnBorder: "#4a7c59", clearBtnColor: "#888", clearBtnBorder: "#ccc",
        scanlines: false,
        cards: {
          doubles: { hBg:"#4a7c59", hColor:"white", badge:"DOUBLES", bBg:"rgba(255,255,255,0.2)", bColor:"rgba(255,255,255,0.85)", bg:"white", border:"none", name:"#1a2e1a", lbl:"#8aab2a", grad:"linear-gradient(90deg,#c8e052,#4a7c59)", shadow:"0 2px 8px rgba(26,46,26,0.08)" },
          singles: { hBg:"#7a6a3a", hColor:"white", badge:"SINGLES", bBg:"rgba(255,255,255,0.2)", bColor:"rgba(255,255,255,0.85)", bg:"white", border:"none", name:"#2a1e0a", lbl:"#b8962a", grad:"linear-gradient(90deg,#f0d060,#b8962a)", shadow:"0 2px 8px rgba(60,40,0,0.08)" },
          sitout:  { hBg:"#dceadc", hColor:"#5a7a5a", badge:"SIT OUT", bBg:"rgba(90,122,90,0.15)", bColor:"#7a9a7a", bg:"#f7faf5", border:"1.5px dashed #c8dcc8", name:"#3a5a3a", lbl:"#8aab2a", grad:"linear-gradient(90deg,#c8dcc8,#8aab2a)", shadow:"0 1px 4px rgba(26,46,26,0.05)" },
        },
      },
      scoreboard: {
        name: "Scoreboard", emoji: "📟", font: "'Courier New',Courier,monospace",
        pageBg: "#080808", pageGradient: "radial-gradient(ellipse at 50% 0%,rgba(255,160,0,0.06) 0%,transparent 65%)",
        titleColor: "#ffa500", accentBar: "#ffa500",
        panelBg: "#0e0e0e", panelShadow: "none", panelBorder: "1px solid #222",
        headerBg: "#0a0a0a", headerColor: "#ffa500", headerBadgeBg: "rgba(255,165,0,0.12)", headerBadgeColor: "#ffa500",
        textareaBg: "#111", textareaBorder: "#2a2a2a", textareaFocus: "#ffa500", textareaColor: "#e0e0e0", textareaPlaceholder: "#333",
        chipBg: "#161616", chipBorder: "#2a2a2a", chipColor: "#e0e0e0",
        chipHoverBg: "#2a1010", chipHoverBorder: "#6a2020", chipHoverColor: "#ff8080",
        footerBorder: "#1e1e1e", footerText: "#444", footerMuted: "#2a2a2a",
        drawBtnBg: "transparent", drawBtnColor: "#ffa500", drawBtnHover: "rgba(255,165,0,0.08)", drawBtnBorder: "1px solid #ffa500",
        drawBtnDisabledBg: "transparent", drawBtnDisabledColor: "#333",
        editBtnColor: "#555", editBtnBorder: "#333", clearBtnColor: "#333", clearBtnBorder: "#222",
        scanlines: true,
        cards: {
          doubles: { hBg:"#0a0a0a", hColor:"#ffa500", badge:"DOUBLES", bBg:"rgba(255,165,0,0.1)", bColor:"#ffa500", bg:"#111", border:"1px solid #1e1e1e", name:"#e0e0e0", lbl:"#ffa500", grad:"linear-gradient(90deg,#2a1800,#ffa500)", shadow:"none" },
          singles: { hBg:"#0a0a0a", hColor:"#ff6b35", badge:"SINGLES", bBg:"rgba(255,107,53,0.1)", bColor:"#ff6b35", bg:"#111", border:"1px solid #1e1e1e", name:"#e0e0e0", lbl:"#ff6b35", grad:"linear-gradient(90deg,#2a1000,#ff6b35)", shadow:"none" },
          sitout:  { hBg:"#0a0a0a", hColor:"#333", badge:"WAITING", bBg:"rgba(100,100,100,0.08)", bColor:"#333", bg:"#0d0d0d", border:"1px dashed #1a1a1a", name:"#444", lbl:"#2a2a2a", grad:"linear-gradient(90deg,#111,#1a1a1a)", shadow:"none" },
        },
      },
      dark: {
        name: "Dark Court", emoji: "🎾", font: "Georgia,'Times New Roman',serif",
        pageBg: "#0f2e0f", pageGradient: "radial-gradient(ellipse at 50% 0%,#1a4d1a 0%,#0a1f0a 70%)",
        titleColor: "#fff", accentBar: "#c8f542",
        panelBg: "rgba(255,255,255,0.04)", panelShadow: "none", panelBorder: "1px solid rgba(200,245,66,0.2)",
        headerBg: "rgba(0,0,0,0.3)", headerColor: "#c8f542", headerBadgeBg: "rgba(200,245,66,0.15)", headerBadgeColor: "#c8f542",
        textareaBg: "rgba(0,0,0,0.3)", textareaBorder: "rgba(200,245,66,0.2)", textareaFocus: "#c8f542", textareaColor: "#c8f542", textareaPlaceholder: "rgba(200,245,66,0.2)",
        chipBg: "rgba(200,245,66,0.08)", chipBorder: "rgba(200,245,66,0.2)", chipColor: "#c8f542",
        chipHoverBg: "rgba(255,100,100,0.15)", chipHoverBorder: "rgba(255,100,100,0.4)", chipHoverColor: "#ff8080",
        footerBorder: "rgba(200,245,66,0.1)", footerText: "rgba(200,245,66,0.35)", footerMuted: "rgba(200,245,66,0.15)",
        drawBtnBg: "#c8f542", drawBtnColor: "#0a1f0a", drawBtnHover: "#b0dc2a", drawBtnBorder: "none",
        drawBtnDisabledBg: "rgba(200,245,66,0.2)", drawBtnDisabledColor: "rgba(200,245,66,0.4)",
        editBtnColor: "#c8f542", editBtnBorder: "#c8f542", clearBtnColor: "#4a6a4a", clearBtnBorder: "#2a4a2a",
        scanlines: false,
        cards: {
          doubles: { hBg:"rgba(0,0,0,0.4)", hColor:"#c8f542", badge:"DOUBLES", bBg:"rgba(200,245,66,0.1)", bColor:"#c8f542", bg:"rgba(255,255,255,0.03)", border:"1px solid rgba(200,245,66,0.15)", name:"#ffffff", lbl:"#c8f542", grad:"linear-gradient(90deg,#c8f542,#4a9a4a)", shadow:"0 2px 12px rgba(0,0,0,0.3)" },
          singles: { hBg:"rgba(0,0,0,0.4)", hColor:"#f0d060", badge:"SINGLES", bBg:"rgba(240,208,96,0.1)", bColor:"#f0d060", bg:"rgba(255,255,255,0.03)", border:"1px solid rgba(240,208,96,0.15)", name:"#ffffff", lbl:"#f0d060", grad:"linear-gradient(90deg,#f0d060,#b8962a)", shadow:"0 2px 12px rgba(0,0,0,0.3)" },
          sitout:  { hBg:"rgba(0,0,0,0.2)", hColor:"#4a6a4a", badge:"SIT OUT", bBg:"rgba(74,106,74,0.1)", bColor:"#4a6a4a", bg:"rgba(255,255,255,0.02)", border:"1px dashed rgba(200,245,66,0.08)", name:"rgba(200,245,66,0.4)", lbl:"#2a4a2a", grad:"linear-gradient(90deg,#1a3a1a,#2a5a2a)", shadow:"none" },
        },
      },
      chalk: {
        name: "Chalk", emoji: "🎱", font: "'Trebuchet MS',Arial,sans-serif",
        pageBg: "#1a1a2e", pageGradient: "radial-gradient(ellipse at 30% 20%,rgba(90,60,140,0.3) 0%,transparent 55%),radial-gradient(ellipse at 70% 80%,rgba(30,80,140,0.25) 0%,transparent 50%)",
        titleColor: "#f0f0f0", accentBar: "#e040fb",
        panelBg: "rgba(255,255,255,0.05)", panelShadow: "none", panelBorder: "1px solid rgba(255,255,255,0.1)",
        headerBg: "rgba(224,64,251,0.15)", headerColor: "#f0f0f0", headerBadgeBg: "rgba(224,64,251,0.25)", headerBadgeColor: "#e040fb",
        textareaBg: "rgba(0,0,0,0.3)", textareaBorder: "rgba(255,255,255,0.1)", textareaFocus: "#e040fb", textareaColor: "#f0f0f0", textareaPlaceholder: "rgba(255,255,255,0.2)",
        chipBg: "rgba(255,255,255,0.07)", chipBorder: "rgba(255,255,255,0.15)", chipColor: "#f0f0f0",
        chipHoverBg: "rgba(224,64,251,0.15)", chipHoverBorder: "rgba(224,64,251,0.4)", chipHoverColor: "#e040fb",
        footerBorder: "rgba(255,255,255,0.08)", footerText: "rgba(255,255,255,0.3)", footerMuted: "rgba(255,255,255,0.15)",
        drawBtnBg: "#e040fb", drawBtnColor: "white", drawBtnHover: "#c020db", drawBtnBorder: "none",
        drawBtnDisabledBg: "rgba(224,64,251,0.2)", drawBtnDisabledColor: "rgba(255,255,255,0.3)",
        editBtnColor: "#e040fb", editBtnBorder: "#e040fb", clearBtnColor: "rgba(255,255,255,0.3)", clearBtnBorder: "rgba(255,255,255,0.15)",
        scanlines: false,
        cards: {
          doubles: { hBg:"rgba(224,64,251,0.15)", hColor:"#f0f0f0", badge:"DOUBLES", bBg:"rgba(224,64,251,0.2)", bColor:"#e040fb", bg:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", name:"#ffffff", lbl:"#e040fb", grad:"linear-gradient(90deg,#e040fb,#7c4dff)", shadow:"0 2px 16px rgba(0,0,0,0.4)" },
          singles: { hBg:"rgba(124,77,255,0.2)", hColor:"#f0f0f0", badge:"SINGLES", bBg:"rgba(124,77,255,0.25)", bColor:"#7c4dff", bg:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", name:"#ffffff", lbl:"#7c4dff", grad:"linear-gradient(90deg,#7c4dff,#e040fb)", shadow:"0 2px 16px rgba(0,0,0,0.4)" },
          sitout:  { hBg:"rgba(255,255,255,0.05)", hColor:"rgba(255,255,255,0.3)", badge:"SIT OUT", bBg:"rgba(255,255,255,0.05)", bColor:"rgba(255,255,255,0.2)", bg:"rgba(255,255,255,0.02)", border:"1px dashed rgba(255,255,255,0.08)", name:"rgba(255,255,255,0.3)", lbl:"rgba(255,255,255,0.15)", grad:"linear-gradient(90deg,rgba(255,255,255,0.05),rgba(255,255,255,0.1))", shadow:"none" },
        },
      },
    };

    const THEME_KEYS = ["club", "scoreboard", "dark", "chalk"];

    function App() {
      const [themeKey, setThemeKey] = useState(() => {
        try { return localStorage.getItem("tennisDrawTheme") || "club"; } catch { return "club"; }
      });
      const [players, setPlayers]       = useState([]);
      const [pasteText, setPasteText]   = useState("");
      const [parseError, setParseError] = useState("");
      const [draw, setDraw]             = useState(null);
      const [drawKey, setDrawKey]       = useState(0);
      const [editMode, setEditMode]     = useState(true);
      const [busy, setBusy]             = useState(false);
      const revealed = useReveal(drawKey);
      const T   = THEMES[themeKey];
      const F   = T.font;
      const isSB = themeKey === "scoreboard";
      const pc  = players.length;
      const tc  = Math.floor(pc / 2);
      const cc  = Math.floor(tc / 2);
      const hasSingles = tc % 2 === 1;
      const hasSitout  = pc % 2 === 1;
      const canDraw = pc >= 2 || parseNames(pasteText).length >= 2;

      function handleThemeChange(key) {
        setThemeKey(key);
        try { localStorage.setItem("tennisDrawTheme", key); } catch {}
      }

      function triggerDraw(namesToUse) {
        setBusy(true); setEditMode(false);
        setTimeout(() => { setDraw(buildDraw(namesToUse)); setDrawKey(k => k + 1); setBusy(false); }, 300);
      }

      function doImport(text) {
        const names = parseNames(text);
        if (names.length < 2) { setParseError("Couldn't find enough names — try editing below."); return; }
        setPlayers(names); setPasteText(""); setParseError("");
        triggerDraw(names);
      }

      function handleDraw() {
        if (busy) return;
        if (pasteText.trim()) { doImport(pasteText); return; }
        if (!canDraw) return;
        triggerDraw(players);
      }

      function handleClear() {
        setDraw(null); setEditMode(true); setPasteText(""); setParseError("");
      }

      return (
        <div style={{ minHeight:"100vh", background:T.pageBg, backgroundImage:T.pageGradient, display:"flex", flexDirection:"column", alignItems:"center", padding:"16px 12px 40px", fontFamily:F, position:"relative", overflow:"hidden" }}>

          {T.scanlines && <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:20, backgroundImage:"repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px)" }}/>}

          {/* Header */}
          <div style={{ width:"100%", maxWidth:"560px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"12px", marginBottom:"14px" }}>
            <h1 style={{ fontSize:"19px", fontWeight:"900", color:T.titleColor, margin:0, lineHeight:1, fontFamily:F, textShadow:isSB?"0 0 20px rgba(255,165,0,0.4)":"none", display:"flex", alignItems:"center", gap:"8px" }}>
              <svg width="24" height="24" viewBox="0 0 42 42" style={{ flexShrink:0 }}>
                <circle cx="21" cy="21" r="20" fill="#c8e052" stroke="#8aab2a" strokeWidth="1.5"/>
                <path d="M5 17 Q21 21 5 25" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
                <path d="M37 17 Q21 21 37 25" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
              </svg>
              {isSB ? "DRAW SHEET" : "Draw Sheet"}
            </h1>
            <div style={{ display:"flex", gap:"3px", background:isSB?"#0e0e0e":"rgba(0,0,0,0.06)", padding:"3px", borderRadius:"8px", border:isSB?"1px solid #1e1e1e":"none", flexShrink:0 }}>
              {THEME_KEYS.map(key => {
                const active = key === themeKey;
                return (
                  <button key={key} onClick={() => handleThemeChange(key)} title={THEMES[key].name}
                    style={{ background:active?(isSB?"#ffa500":T.accentBar):"transparent", color:active?(key==="club"?"white":key==="dark"?"#0a1f0a":"white"):(isSB?"#444":"rgba(0,0,0,0.35)"), border:"none", borderRadius:"5px", padding:"5px 8px", fontSize:"15px", cursor:"pointer", transition:"all 0.2s", lineHeight:1 }}
                  >{THEMES[key].emoji}</button>
                );
              })}
            </div>
          </div>

          {/* Roster panel */}
          {editMode && (
            <div style={{ width:"100%", maxWidth:"560px", marginBottom:"14px", background:T.panelBg, borderRadius:isSB?"0":"6px", boxShadow:T.panelShadow, border:T.panelBorder, overflow:"hidden" }}>
              <div style={{ padding:"10px 12px", borderBottom:`1px solid ${T.footerBorder}` }}>
                <textarea value={pasteText}
                  onChange={e => { setPasteText(e.target.value); setParseError(""); }}
                  onPaste={e => { const text = e.clipboardData.getData("text"); if (text) { setTimeout(() => doImport(text), 0); } }}
                  placeholder={isSB ? "PASTE PLAYER LIST HERE..." : "Paste player list here…"}
                  rows={3}
                  style={{ width:"100%", boxSizing:"border-box", padding:"9px 11px", border:`1.5px solid ${T.textareaBorder}`, borderRadius:isSB?"2px":"4px", fontFamily:F, fontSize:"13px", color:T.textareaColor, background:T.textareaBg, outline:"none", resize:"none", lineHeight:1.5, display:"block" }}
                  onFocus={e => e.target.style.borderColor = T.textareaFocus}
                  onBlur={e => e.target.style.borderColor = T.textareaBorder}
                />
                {parseError && <p style={{ margin:"6px 0 0", fontSize:"12px", color:"#e05050", fontFamily:F }}>{parseError}</p>}
              </div>

              {pc > 0 && (
                <div style={{ padding:"8px 10px", display:"flex", flexWrap:"wrap", gap:"5px" }}>
                  {players.map(name => (
                    <button key={name} onClick={() => setPlayers(p => p.filter(x => x !== name))}
                      style={{ display:"flex", alignItems:"center", gap:"5px", background:T.chipBg, border:`1.5px solid ${T.chipBorder}`, borderRadius:isSB?"2px":"16px", padding:"4px 8px 4px 11px", cursor:"pointer", fontFamily:F, fontSize:"13px", fontWeight:"600", color:T.chipColor, transition:"all 0.15s" }}
                      onMouseEnter={e => { e.currentTarget.style.background=T.chipHoverBg; e.currentTarget.style.borderColor=T.chipHoverBorder; e.currentTarget.style.color=T.chipHoverColor; }}
                      onMouseLeave={e => { e.currentTarget.style.background=T.chipBg; e.currentTarget.style.borderColor=T.chipBorder; e.currentTarget.style.color=T.chipColor; }}
                    >
                      {isSB ? name.toUpperCase() : name} <span style={{ fontSize:"10px", opacity:0.4 }}>✕</span>
                    </button>
                  ))}
                </div>
              )}

              <div style={{ borderTop:`1px solid ${T.footerBorder}`, padding:"6px 12px", fontSize:"11px", fontFamily:F, color:pc < 2 ? T.footerMuted : T.footerText, letterSpacing:isSB?"1px":"0" }}>
                {pc < 2
                  ? (isSB ? "PASTE PLAYER LIST TO BEGIN" : "Paste a player list to begin")
                  : `${cc} doubles court${cc!==1?"s":""}${hasSingles?" · 1 singles":""}${hasSitout?" · 1 sitting out":""}`
                }
              </div>
            </div>
          )}

          {/* Draw cards */}
          {draw && (
            <div style={{ display:"flex", flexDirection:"column", gap:"7px", width:"100%", maxWidth:"560px", marginBottom:"14px" }}>
              {draw.map((court, ci) => {
                const s = T.cards[court.type];
                return (
                  <div key={`${drawKey}-${ci}`} style={{ background:s.bg, borderRadius:isSB?"0":"4px", boxShadow:s.shadow, overflow:"hidden", border:s.border||"none", transform:revealed?"translateY(0)":"translateY(10px)", opacity:revealed?1:0, transition:`transform 0.35s cubic-bezier(0.22,1,0.36,1) ${ci*60}ms,opacity 0.25s ease ${ci*60}ms` }}>
                    <div style={{ background:s.hBg, padding:"6px 11px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:isSB?"1px solid #1e1e1e":"none" }}>
                      <span style={{ color:s.hColor, fontSize:"11px", fontWeight:"700", letterSpacing:isSB?"3px":"0.5px", fontFamily:F }}>{isSB?court.label.toUpperCase():court.label}</span>
                      <span style={{ background:s.bBg, color:s.bColor, fontSize:"9px", letterSpacing:"1.5px", padding:"2px 6px", borderRadius:isSB?"1px":"2px", fontFamily:F }}>{s.badge}</span>
                    </div>

                    {court.type === "doubles" && (
                      <div style={{ padding:"9px 11px", display:"flex", alignItems:"center" }}>
                        <div style={{ flex:1, display:"flex", alignItems:"center", gap:"4px", flexWrap:"wrap" }}>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team1[0].toUpperCase():court.team1[0]}</span>
                          <span style={{ fontSize:"12px", color:s.lbl, fontFamily:F }}>&amp;</span>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team1[1].toUpperCase():court.team1[1]}</span>
                        </div>
                        <div style={{ flexShrink:0, padding:"0 8px" }}>
                          <span style={{ fontSize:"9px", letterSpacing:"2px", color:s.hColor, fontFamily:F, fontWeight:"900", background:s.hBg, padding:"3px 6px", borderRadius:"3px" }}>VS</span>
                        </div>
                        <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end", gap:"4px", flexWrap:"wrap" }}>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team2[0].toUpperCase():court.team2[0]}</span>
                          <span style={{ fontSize:"12px", color:s.lbl, fontFamily:F }}>&amp;</span>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team2[1].toUpperCase():court.team2[1]}</span>
                        </div>
                      </div>
                    )}

                    {court.type === "singles" && (
                      <div style={{ padding:"9px 11px", display:"flex", alignItems:"center" }}>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>{isSB?court.team1[0].toUpperCase():court.team1[0]}</span>
                        <div style={{ flexShrink:0, padding:"0 8px" }}>
                          <span style={{ fontSize:"9px", letterSpacing:"2px", color:s.hColor, fontFamily:F, fontWeight:"900", background:s.hBg, padding:"3px 6px", borderRadius:"3px" }}>VS</span>
                        </div>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>{isSB?court.team1[1].toUpperCase():court.team1[1]}</span>
                      </div>
                    )}

                    {court.type === "sitout" && (
                      <div style={{ padding:"9px 11px" }}>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>
                          {court.team1.map(p => isSB ? p.toUpperCase() : p).join(" & ")}
                        </span>
                      </div>
                    )}

                    <div style={{ height:"3px", background:s.grad }}/>
                  </div>
                );
              })}
            </div>
          )}

          {/* Buttons */}
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", justifyContent:"center" }}>
            <button onClick={handleDraw} disabled={busy||!canDraw}
              style={{ background:busy||!canDraw?T.drawBtnDisabledBg:T.drawBtnBg, color:busy||!canDraw?T.drawBtnDisabledColor:T.drawBtnColor, border:T.drawBtnBorder==="none"?"none":(busy||!canDraw?`1px solid ${T.clearBtnBorder}`:T.drawBtnBorder), borderRadius:isSB?"2px":"3px", fontFamily:F, fontSize:"13px", fontWeight:"700", letterSpacing:isSB?"4px":"2px", textTransform:"uppercase", padding:"11px 32px", cursor:busy||!canDraw?"not-allowed":"pointer", transition:"all 0.2s" }}
              onMouseEnter={e => { if (!busy&&canDraw) e.currentTarget.style.background=T.drawBtnHover; }}
              onMouseLeave={e => { if (!busy&&canDraw) e.currentTarget.style.background=T.drawBtnBg; }}
            >
              {busy?(isSB?"DRAWING...":"Drawing…"):(isSB?"◈ REDRAW ◈":"↺ Draw")}
            </button>
            {!editMode && (
              <button onClick={() => setEditMode(true)}
                style={{ background:"transparent", color:T.editBtnColor, border:`2px solid ${T.editBtnBorder}`, borderRadius:isSB?"2px":"3px", fontFamily:F, fontSize:"13px", fontWeight:"700", letterSpacing:isSB?"3px":"2px", textTransform:"uppercase", padding:"11px 18px", cursor:"pointer", transition:"all 0.2s" }}
                onMouseEnter={e => { e.currentTarget.style.opacity="0.7"; }}
                onMouseLeave={e => { e.currentTarget.style.opacity="1"; }}
              >{isSB?"✎ ROSTER":"✎ Roster"}</button>
            )}
            {draw && (
              <button onClick={handleClear}
                style={{ background:"transparent", color:T.clearBtnColor, border:`2px solid ${T.clearBtnBorder}`, borderRadius:isSB?"2px":"3px", fontFamily:F, fontSize:"13px", fontWeight:"700", letterSpacing:isSB?"3px":"2px", textTransform:"uppercase", padding:"11px 18px", cursor:"pointer", transition:"all 0.2s" }}
                onMouseEnter={e => { e.currentTarget.style.opacity="0.7"; }}
                onMouseLeave={e => { e.currentTarget.style.opacity="1"; }}
              >{isSB?"◻ CLEAR":"✕ Clear"}</button>
            )}
          </div>

          <style>{`textarea::placeholder { color: ${T.textareaPlaceholder}; font-style: italic; }`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>

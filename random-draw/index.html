    const { useState, useEffect, useRef } = React;

    function parseNames(raw) {
      const STOPWORDS = /^(final|list|for|see|you|in|the|and|of|at|tomorrow|morning|tonight|ok|hi|hey|soon|next|out|with|from|gotta|leave|am|pm)$/i;

      const lines = raw.split(/\n/).map(l => l.trim()).filter(l => {
        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}/.test(l)) return false;
        if (/^\[?\d{1,2}:\d{2}/.test(l)) return false;
        if (/^~\s/.test(l)) return false;
        if (/messages? and calls? are end-to-end/i.test(l)) return false;
        return true;
      });

      const cleaned = lines.join("\n")
        .replace(/\([^)]*\)/g, " ")
        .replace(/^\s*\d+[\.\)]\s*/gm, " ");

      // Detect explicit delimiters (excluding & which we handle separately)
      const hasExplicit = /[,;\n]/.test(cleaned) ||
        /\s+[-\•\*\–\—\·\▪\▸\►\○\●]\s*[A-Za-z]/m.test(cleaned) ||
        /^[\s]*[-\•\*\–\—\·\▪\▸\►\○\●]/m.test(cleaned);

      let tokens;
      if (hasExplicit) {
        tokens = cleaned
          .replace(/[\n,;]+/g, ",")
          .replace(/\s+[-\•\*\–\—\·\▪\▸\►\○\●]+\s*/g, ",")
          .split(",")
          .map(t => t.replace(/^[\s\-\•\*\–\—\·\▪\▸\►\○\●]+/, "").trim())
          .filter(Boolean);
      } else {
        tokens = cleaned.trim().split(/\s+/).filter(Boolean);
      }

      // Parse each token; tokens with & become a locked pair
      function parseName(str) {
        const words = str.trim().split(/\s+/).filter(w => w.length > 0 && !STOPWORDS.test(w));
        if (words.length === 0) return null;
        if (!words.every(w => /^[A-Za-zÀ-ÿ][A-Za-zÀ-ÿ''-]*$/.test(w))) return null;
        return words.map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
      }

      const names = [];
      const pairs = [];
      const skipped = [];
      let pairNext = null; // name waiting to be paired with the next token

      for (const token of tokens) {
        if (!token || token.length > 80) continue;
        if (/\d/.test(token)) continue;

        // Check if token contains & — could be "A & B", "A&", or "&B"
        if (/&/.test(token)) {
          const parts = token.split("&").map(p => p.trim()).filter(Boolean);
          if (parts.length === 2) {
            // "A & B" — full pair in one token
            const a = parseName(parts[0]);
            const b = parseName(parts[1]);
            if (a && b) {
              if (!names.includes(a)) names.push(a);
              if (!names.includes(b)) names.push(b);
              pairs.push([a, b]);
            } else {
              if (a && !names.includes(a)) names.push(a);
              if (b && !names.includes(b)) names.push(b);
            }
            pairNext = null;
            continue;
          } else if (parts.length === 1) {
            const name = parseName(parts[0]);
            if (name) {
              if (!names.includes(name)) names.push(name);
              // Trailing "&" — this player wants to be paired with the next one
              if (token.trim().endsWith("&") || token.trim().startsWith("&")) {
                pairNext = name;
              }
            }
            continue;
          }
          skipped.push(token);
          continue;
        }

        // Normal token
        const name = parseName(token);
        if (name) {
          if (!names.includes(name)) names.push(name);
          if (pairNext && pairNext !== name) {
            pairs.push([pairNext, name]);
            pairNext = null;
          } else {
            pairNext = null;
          }
        } else if (/[A-Za-zÀ-ÿ]/.test(token)) {
          skipped.push(token);
          pairNext = null;
        }
      }

      return { names, pairs, skipped };
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }

    function buildDraw(players, mode, pairs) {
      // Separate locked pairs from free agents
      const lockedPairs = (pairs || []).filter(([a, b]) => players.includes(a) && players.includes(b));
      const lockedNames = new Set(lockedPairs.flat());
      const freeAgents = shuffle(players.filter(p => !lockedNames.has(p)));

      const courts = []; let n = 1;

      if (mode === "singles") {
        // Ignore pairs in singles — just shuffle everyone
        const all = shuffle([...players]);
        for (let i = 0; i + 1 < all.length; i += 2) {
          courts.push({ label: `Court ${n}`, team1: [all[i]], team2: [all[i+1]], type: "singles" }); n++;
        }
        if (all.length % 2 === 1) courts.push({ label: "Sitting Out", team1: [all[all.length-1]], team2: null, type: "sitout" });
      } else {
        // Build teams: locked pairs first, then pair up free agents
        const teams = [...lockedPairs];
        for (let i = 0; i + 1 < freeAgents.length; i += 2) teams.push([freeAgents[i], freeAgents[i+1]]);
        const solo = freeAgents.length % 2 === 1 ? freeAgents[freeAgents.length-1] : null;

        // Shuffle the teams array so locked pairs don't always end up on Court 1
        const shuffledTeams = shuffle(teams);

        for (let i = 0; i + 1 < shuffledTeams.length; i += 2) {
          courts.push({ label: `Court ${n}`, team1: shuffledTeams[i], team2: shuffledTeams[i+1], type: "doubles" }); n++;
        }
        if (shuffledTeams.length % 2 === 1) courts.push({ label: `Court ${n}`, team1: shuffledTeams[shuffledTeams.length-1], team2: null, type: "singles" });
        if (solo) courts.push({ label: "Sitting Out", team1: [solo], team2: null, type: "sitout" });
      }
      return courts;
    }

    function useReveal(key) {
      const [on, setOn] = useState(false);
      useEffect(() => { if (!key) { setOn(false); return; } const t = setTimeout(() => setOn(true), 60); return () => clearTimeout(t); }, [key]);
      return on;
    }

      },
    };

    const THEME_KEYS = ["club", "scoreboard", "dark", "chalk", "coastal", "nightmatch", "broadsheet", "clay", "neon", "usopen", "wimbledon", "frenchopen", "ausopen", "cincinnati"];

    function App() {
      const [themeKey, setThemeKey] = useState(() => {
        try { return localStorage.getItem("tennisDrawTheme") || "dark"; } catch { return "dark"; }
      });
      const [players, setPlayers]       = useState([]);
      const [pairs, setPairs]           = useState([]);
      const [pasteText, setPasteText]   = useState("");
      const [parseError, setParseError] = useState("");
      const [draw, setDraw]             = useState(null);
      const [drawKey, setDrawKey]       = useState(0);
      const [editMode, setEditMode]     = useState(true);
      const [busy, setBusy]             = useState(false);
      const [mode, setMode]             = useState("doubles");
      const [partialCleared, setPartialCleared] = useState(false);
      const revealed = useReveal(drawKey);
      const T   = THEMES[themeKey];
      const F   = T.font;
      const isSB = themeKey === "scoreboard";
      const pc  = players.length;
      const tc  = Math.floor(pc / 2);
      const cc  = Math.floor(tc / 2);
      const hasSingles = tc % 2 === 1;
      const hasSitout  = pc % 2 === 1;
      const canDraw = pc >= 2 || parseNames(pasteText).names.length >= 2;

      const [themeOpen, setThemeOpen] = useState(false);
      useEffect(() => {
        if (!themeOpen) return;
        const close = () => setThemeOpen(false);
        setTimeout(() => document.addEventListener("click", close), 0);
        return () => document.removeEventListener("click", close);
      }, [themeOpen]);

      function handleThemeChange(key) {
        setThemeKey(key);
        setThemeOpen(false);
        try { localStorage.setItem("tennisDrawTheme", key); } catch {}
      }

      function triggerDraw(namesToUse, pairsToUse) {
        setBusy(true); setEditMode(false);
        setTimeout(() => { setDraw(buildDraw(namesToUse, mode, pairsToUse || pairs)); setDrawKey(k => k + 1); setBusy(false); }, 300);
      }

      function doImport(text) {
        const { names, pairs: newPairs, skipped } = parseNames(text);
        if (names.length < 2) { setParseError("Couldn't find enough names — try editing below."); return; }
        if (skipped.length > 0) {
          setParseError(`Heads up: couldn't parse "${skipped.join('", "')}" — remove or fix and reimport if needed.`);
        } else {
          setParseError("");
        }
        setPlayers(names); setPairs(newPairs);
        setPartialCleared(false);
        triggerDraw(names, newPairs);
      }

      function handleDraw() {
        if (busy) return;
        if (pasteText.trim()) { doImport(pasteText); return; }
        if (!canDraw) return;
        triggerDraw(players);
      }

      function handleClear() {
        if (!partialCleared) {
          setDraw(null); setEditMode(true); setPlayers([]); setPairs([]); setParseError("");
          setPartialCleared(true);
        } else {
          setPasteText(""); setParseError(""); setPartialCleared(false);
        }
      }

      return (
        <div style={{ minHeight:"100vh", background:T.pageBg, backgroundImage:T.pageGradient, display:"flex", flexDirection:"column", alignItems:"center", padding:"16px 12px 40px", fontFamily:F, position:"relative", overflow:"hidden" }}>

          {T.scanlines && <div style={{ position:"fixed", inset:0, pointerEvents:"none", zIndex:20, backgroundImage:"repeating-linear-gradient(to bottom,transparent 0px,transparent 3px,rgba(0,0,0,0.12) 3px,rgba(0,0,0,0.12) 4px)" }}/>}

          {/* Header */}
          <div style={{ width:"100%", maxWidth:"560px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"12px", marginBottom:"14px" }}>
            <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
              <h1 style={{ fontSize:"19px", fontWeight:"900", color:T.titleColor, margin:0, lineHeight:1, fontFamily:F, textShadow:isSB?"0 0 20px rgba(255,165,0,0.4)":"none", display:"flex", alignItems:"center", gap:"8px" }}>
                <svg width="24" height="24" viewBox="0 0 42 42" style={{ flexShrink:0 }}>
                  <circle cx="21" cy="21" r="20" fill="#c8e052" stroke="#8aab2a" strokeWidth="1.5"/>
                  <path d="M5 17 Q21 21 5 25" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
                  <path d="M37 17 Q21 21 37 25" stroke="white" strokeWidth="2.5" fill="none" strokeLinecap="round"/>
                </svg>
                {isSB ? "MATCHUP RANDOMIZER" : "Matchup Randomizer"}
              </h1>
              {/* Singles / Doubles toggle */}
              <div style={{ display:"flex", gap:"0", background:"rgba(0,0,0,0.08)", borderRadius:"4px", padding:"2px", alignSelf:"flex-start" }}>
                {["doubles","singles"].map(m => (
                  <button key={m} onClick={() => setMode(m)}
                    style={{ background: mode===m ? T.accentBar : "transparent", color: mode===m ? (["club","coastal","nightmatch","broadsheet","clay"].includes(themeKey)?"white":themeKey==="neon"?"#060608":themeKey==="scoreboard"?"#000":"#000") : T.titleColor, border:"none", borderRadius:"3px", padding:"4px 10px", fontFamily:F, fontSize:"11px", fontWeight:"700", cursor:"pointer", letterSpacing:"1px", textTransform:"uppercase", transition:"all 0.15s", opacity: mode===m ? 1 : 0.5 }}
                  >{m}</button>
                ))}
              </div>
            </div>
            <div style={{ position:"relative", flexShrink:0 }}>
              <button
                onClick={() => setThemeOpen(o => !o)}
                style={{ background:"transparent", border:"none", color:T.titleColor, fontFamily:F, fontSize:"13px", fontWeight:"700", cursor:"pointer", letterSpacing:"1px", opacity:0.7, padding:"4px 0" }}
              >
                Theme ▾
              </button>
              {themeOpen && (
                <div style={{ position:"absolute", right:0, top:"calc(100% + 6px)", zIndex:100, border:`1px solid ${T.footerBorder||"#e0e0e0"}`, borderRadius:"6px", overflow:"hidden", boxShadow:"0 8px 24px rgba(0,0,0,0.25)", minWidth:"170px" }}>
                  {THEME_KEYS.map(key => {
                    const th = THEMES[key];
                    const active = key === themeKey;
                    return (
                      <button key={key}
                        onClick={() => handleThemeChange(key)}
                        style={{ display:"flex", alignItems:"center", gap:"10px", width:"100%", padding:"10px 14px", background:th.pageBg, border:"none", borderBottom:`1px solid ${th.footerBorder||"rgba(0,0,0,0.06)"}`, color:th.titleColor, fontFamily:th.font, fontSize:"13px", fontWeight:"700", cursor:"pointer", textAlign:"left", transition:"all 0.15s", letterSpacing:"0.5px" }}
                        onMouseEnter={e => { e.currentTarget.style.background = th.headerBg; e.currentTarget.style.color = th.headerColor; }}
                        onMouseLeave={e => { e.currentTarget.style.background = th.pageBg; e.currentTarget.style.color = th.titleColor; }}
                      >
                        <span style={{ fontSize:"16px", lineHeight:1 }}>{th.emoji}</span>
                        {th.name}
                        {active && <span style={{ marginLeft:"auto", fontSize:"13px" }}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          {/* Roster panel */}
          {!draw && (
            <div style={{ width:"100%", maxWidth:"560px", marginBottom:"14px", background:T.panelBg, borderRadius:isSB?"0":"6px", boxShadow:T.panelShadow, border:T.panelBorder, overflow:"hidden" }}>
              <div style={{ padding:"10px 12px", borderBottom:`1px solid ${T.footerBorder}` }}>
                <textarea value={pasteText}
                  onChange={e => { setPasteText(e.target.value); setParseError(""); }}
                  onPaste={e => { const text = e.clipboardData.getData("text"); if (text) { setTimeout(() => doImport(text), 0); } }}
                  onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); if (pasteText.trim()) doImport(pasteText); } }}
                  placeholder={isSB ? "PASTE OR TYPE PLAYER LIST HERE..." : "Paste or type player list here…"}
                  rows={3}
                  style={{ width:"100%", boxSizing:"border-box", padding:"9px 11px", border:`1.5px solid ${T.textareaBorder}`, borderRadius:isSB?"2px":"4px", fontFamily:F, fontSize:"13px", color:T.textareaColor, background:T.textareaBg, outline:"none", resize:"none", lineHeight:1.5, display:"block" }}
                  onFocus={e => e.target.style.borderColor = T.textareaFocus}
                  onBlur={e => e.target.style.borderColor = T.textareaBorder}
                />
                {parseError && <p style={{ margin:"6px 0 0", fontSize:"12px", color:"#e05050", fontFamily:F }}>{parseError}</p>}
              </div>


            {pc >= 2 && (
              <div style={{ borderTop:`1px solid ${T.footerBorder}`, padding:"6px 12px", fontSize:"11px", fontFamily:F, color:T.footerText, letterSpacing:isSB?"1px":"0" }}>
                {mode === "singles"
                  ? `${Math.floor(pc/2)} court${Math.floor(pc/2)!==1?"s":""}${pc%2===1?" · 1 sitting out":""}`
                  : `${cc} doubles court${cc!==1?"s":""}${hasSingles?" · 1 singles":""}${hasSitout?" · 1 sitting out":""}`
                }
              </div>
            )}
            </div>
          )}

          {/* Draw cards */}
          {draw && (
            <div style={{ display:"flex", flexDirection:"column", gap:"7px", width:"100%", maxWidth:"560px", marginBottom:"14px" }}>
              {draw.map((court, ci) => {
                const s = T.cards[court.type];
                return (
                  <div key={`${drawKey}-${ci}`} style={{ background:s.bg, borderRadius:isSB?"0":"4px", boxShadow:s.shadow, overflow:"hidden", border:s.border||"none", transform:revealed?"translateY(0)":"translateY(10px)", opacity:revealed?1:0, transition:`transform 0.35s cubic-bezier(0.22,1,0.36,1) ${ci*60}ms,opacity 0.25s ease ${ci*60}ms` }}>
                    <div style={{ background:s.hBg, padding:"6px 11px", display:"flex", alignItems:"center", justifyContent:"space-between", borderBottom:isSB?"1px solid #1e1e1e":"none" }}>
                      <span style={{ color:s.hColor, fontSize:"11px", fontWeight:"700", letterSpacing:isSB?"3px":"0.5px", fontFamily:F }}>{isSB?court.label.toUpperCase():court.label}</span>
                      <span style={{ background:s.bBg, color:s.bColor, fontSize:"9px", letterSpacing:"1.5px", padding:"2px 6px", borderRadius:isSB?"1px":"2px", fontFamily:F }}>{s.badge}</span>
                    </div>

                    {court.type === "doubles" && (
                      <div style={{ padding:"9px 11px", display:"flex", alignItems:"center" }}>
                        <div style={{ flex:1, display:"flex", alignItems:"center", gap:"4px", flexWrap:"wrap" }}>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team1[0].toUpperCase():court.team1[0]}</span>
                          <span style={{ fontSize:"12px", color:s.lbl, fontFamily:F }}>&amp;</span>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team1[1].toUpperCase():court.team1[1]}</span>
                        </div>
                        <div style={{ flexShrink:0, padding:"0 8px" }}>
                          <span style={{ fontSize:"9px", letterSpacing:"2px", color:s.hColor, fontFamily:F, fontWeight:"900", background:s.hBg, padding:"3px 6px", borderRadius:"3px" }}>VS</span>
                        </div>
                        <div style={{ flex:1, display:"flex", alignItems:"center", justifyContent:"flex-end", gap:"4px", flexWrap:"wrap" }}>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team2[0].toUpperCase():court.team2[0]}</span>
                          <span style={{ fontSize:"12px", color:s.lbl, fontFamily:F }}>&amp;</span>
                          <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F, letterSpacing:isSB?"1px":"-0.3px" }}>{isSB?court.team2[1].toUpperCase():court.team2[1]}</span>
                        </div>
                      </div>
                    )}

                    {court.type === "singles" && (
                      <div style={{ padding:"9px 11px", display:"flex", alignItems:"center" }}>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>{isSB?court.team1[0].toUpperCase():court.team1[0]}</span>
                        <div style={{ flexShrink:0, padding:"0 8px" }}>
                          <span style={{ fontSize:"9px", letterSpacing:"2px", color:s.hColor, fontFamily:F, fontWeight:"900", background:s.hBg, padding:"3px 6px", borderRadius:"3px" }}>VS</span>
                        </div>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>{isSB?court.team1[1].toUpperCase():court.team1[1]}</span>
                      </div>
                    )}

                    {court.type === "sitout" && (
                      <div style={{ padding:"9px 11px" }}>
                        <span style={{ fontSize:"16px", fontWeight:"700", color:s.name, fontFamily:F }}>
                          {court.team1.map(p => isSB ? p.toUpperCase() : p).join(" & ")}
                        </span>
                      </div>
                    )}

                    <div style={{ height:"3px", background:s.grad }}/>
                  </div>
                );
              })}
            </div>
          )}

          {/* Buttons */}
          <div style={{ display:"flex", gap:"8px", flexWrap:"wrap", justifyContent:"center" }}>
            <button onClick={handleDraw} disabled={busy||!canDraw}
              style={{ background:busy||!canDraw?T.drawBtnDisabledBg:T.drawBtnBg, color:busy||!canDraw?T.drawBtnDisabledColor:T.drawBtnColor, border:T.drawBtnBorder==="none"?"none":(busy||!canDraw?`1px solid ${T.clearBtnBorder}`:T.drawBtnBorder), borderRadius:isSB?"2px":"3px", fontFamily:F, fontSize:"13px", fontWeight:"700", letterSpacing:isSB?"4px":"2px", textTransform:"uppercase", padding:"11px 32px", cursor:busy||!canDraw?"not-allowed":"pointer", transition:"all 0.2s" }}
              onMouseEnter={e => { if (!busy&&canDraw) e.currentTarget.style.background=T.drawBtnHover; }}
              onMouseLeave={e => { if (!busy&&canDraw) e.currentTarget.style.background=T.drawBtnBg; }}
            >
              {busy?(isSB?"DRAWING...":"Drawing…"):(draw?(isSB?"◈ REDRAW ◈":"↺ Redraw"):(isSB?"◈ DRAW ◈":"↺ Draw"))}
            </button>
            {(draw || players.length > 0 || pasteText.trim() || partialCleared) && (
              <button onClick={handleClear}
                style={{ background:T.clearBtnBg, color:T.clearBtnColor, border:T.clearBtnBorder==="none"?"none":`2px solid ${T.clearBtnBorder}`, borderRadius:isSB?"2px":"3px", fontFamily:F, fontSize:"13px", fontWeight:"700", letterSpacing:isSB?"3px":"2px", textTransform:"uppercase", padding:"11px 18px", cursor:"pointer", transition:"all 0.2s", boxShadow: (themeKey==="club" && draw)?"0 3px 16px rgba(169,50,38,0.35)":"none" }}
                onMouseEnter={e => { e.currentTarget.style.background=T.clearBtnHover; }}
                onMouseLeave={e => { e.currentTarget.style.background=T.clearBtnBg; }}
              >{isSB ? (draw ? "◻ RESET" : "◻ CLEAR") : (draw ? "↺ Reset" : "✕ Clear")}</button>
            )}
          </div>

          <style>{`textarea::placeholder { color: ${T.textareaPlaceholder}; font-style: italic; }`}</style>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
